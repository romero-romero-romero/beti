name: betty_app
description: "Betty — App de Salud Financiera Minimalista y Offline-First"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Auth & Backend (solo backup) ──
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^5.2.1

  # ── Base de Datos Local (Fuente de Verdad) ──
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.0

  # ── Estado ──
  flutter_riverpod: ^2.6.1

  # ── Navegación ──
  go_router: ^14.8.1

  # ── Utilidades ──
  uuid: ^4.5.1
  intl: ^0.19.0
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Generación de código Isar ──
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
